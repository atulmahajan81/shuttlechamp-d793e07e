version: '3.8'

services:
  api:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
    logging:
      driver: "json-file"

  frontend:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
    logging:
      driver: "json-file"

  db:
    deploy:
      restart_policy:
        condition: any
    logging:
      driver: "json-file"

  redis:
    deploy:
      restart_policy:
        condition: any
    logging:
      driver: "json-file"