name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build and push Docker images
      run: |
        docker build -t ghcr.io/${{ github.repository }}/api:latest -f docker/Dockerfile .
        docker build -t ghcr.io/${{ github.repository }}/frontend:latest -f docker/Dockerfile.frontend .
        docker push ghcr.io/${{ github.repository }}/api:latest
        docker push ghcr.io/${{ github.repository }}/frontend:latest

    - name: Deploy to server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER_IP: ${{ secrets.SERVER_IP }}
      run: |
        echo "$SSH_PRIVATE_KEY" > private_key
        chmod 600 private_key
        scp -i private_key docker-compose.prod.yml user@$SERVER_IP:/home/user/app
        ssh -i private_key user@$SERVER_IP "cd /home/user/app && docker-compose pull && docker-compose up -d --build"